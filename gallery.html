<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Karina</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000000'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-size='60' fill='%23FFFFFF' font-family='serif'>K</text></svg>">
    
    <!-- Google Fonts: Viaoda Libre, Pinyon Script, DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400&family=Pinyon+Script&family=Viaoda+Libre&display=swap" rel="stylesheet">

    <style>
        /* CSS Reset & Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'DM Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 2rem;
            z-index: 10;
        }

        nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 3rem;
        }

        nav a {
            color: #FFFFFF;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: opacity 0.3s ease;
        }

        nav a:hover {
            opacity: 0.6;
        }

        /* Mobile Menu Toggle */
        .menu-toggle {
            display: none;
            cursor: pointer;
            position: absolute;
            top: 2rem;
            right: 2rem;
            z-index: 100;
        }

        .menu-toggle .bar {
            display: block;
            width: 25px;
            height: 2px;
            margin: 5px auto;
            transition: all 0.3s ease-in-out;
            background-color: #FFFFFF;
        }

        /* Page Header */
        .gallery-header {
            padding-top: 150px;
            text-align: center;
            margin-bottom: 4rem;
        }

        .gallery-header h1 {
            font-family: 'Viaoda Libre', serif;
            font-size: 4rem;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
        }

        .gallery-header p {
            font-family: 'Pinyon Script', cursive;
            font-size: 2rem;
            color: #FFFFFF;
        }

        /* Masonry Grid */
        .masonry-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 5rem 2rem;
            column-count: 3;
            column-gap: 1.5rem;
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
        }

        .masonry-item img {
            width: 100%;
            display: block;
            filter: grayscale(100%);
            cursor: pointer;
            transition: filter 0.3s ease, opacity 0.3s ease;
        }

        .masonry-item img:hover {
            opacity: 0.8;
        }

        /* Lightbox Overlay */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-img-wrapper {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            filter: grayscale(100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox img.loaded {
            opacity: 1;
        }

        /* Lightbox Controls */
        .lightbox-control {
            position: absolute;
            color: #FFFFFF;
            font-size: 3rem;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.3s ease;
            z-index: 1001;
        }

        .lightbox-control:hover {
            opacity: 0.6;
        }

        .close-btn { top: 20px; right: 40px; font-size: 4rem; line-height: 1; }
        .prev-btn { left: 40px; top: 50%; transform: translateY(-50%); }
        .next-btn { right: 40px; top: 50%; transform: translateY(-50%); }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-up-load {
            animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            will-change: opacity, transform;
        }

        .fade-in-section {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s cubic-bezier(0.2, 0.8, 0.2, 1), transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: opacity, transform;
        }

        .fade-in-section.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

    /* Scroll to Top Button */
    .scroll-top-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 45px;
        height: 45px;
        background-color: #FFFFFF;
        color: #000000;
        border: none;
        border-radius: 50%;
        font-size: 1.2rem;
        cursor: pointer;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transform: translateY(20px);
        transition: all 0.3s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .scroll-top-btn.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    .scroll-top-btn:hover {
        background-color: #e6e6e6;
        transform: translateY(-3px);
    }

        /* Mobile Responsiveness */
        @media (max-width: 900px) {
            .masonry-container { column-count: 2; }
            .prev-btn { left: 20px; font-size: 2rem; }
            .next-btn { right: 20px; font-size: 2rem; }
            .close-btn { top: 10px; right: 20px; font-size: 3rem; }
        }

        @media (max-width: 768px) {
            nav ul {
                position: fixed;
                top: 0;
                left: 100%;
                width: 100%;
                height: 100vh;
                background-color: #000000;
                flex-direction: column;
                align-items: center;
                transition: left 0.4s ease;
                z-index: 99;
                margin: 0;
                padding: 0;
            }
            nav ul.active {
                left: 0;
            }
            nav ul li {
                margin: 1.5rem 0;
            }
            nav ul a {
                font-size: 1.5rem;
            }
            .menu-toggle {
                display: block;
            }
            .menu-toggle.is-active {
                position: fixed;
            }
            .menu-toggle.is-active .bar:nth-child(2) { opacity: 0; }
            .menu-toggle.is-active .bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
            .menu-toggle.is-active .bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
        }

        @media (max-width: 600px) {
            .gallery-header { padding-top: 120px; }
            .gallery-header h1 { font-size: 3rem; }
            .masonry-container { column-count: 1; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="menu-toggle" id="mobile-menu" aria-label="Toggle menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
        <ul id="nav-menu">
            <li><a href="home.html">Home</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Gallery Header -->
    <header class="gallery-header fade-up-load">
        <h1>Portfolio</h1>
        <p>A Collection of Moments</p>
    </header>

    <!-- Masonry Grid for 12 images -->
    <main class="masonry-container fade-in-section" id="gallery-grid">
        <!-- Images dynamically injected via JS to easily populate picsum variations -->
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-control close-btn" id="close-lightbox">&times;</div>
        <div class="lightbox-control prev-btn" id="prev-btn">&#10094;</div>
        <div class="lightbox-control next-btn" id="next-btn">&#10095;</div>
        <div class="lightbox-img-wrapper">
            <img src="" alt="Enlarged wedding photo" id="lightbox-img">
        </div>
    </div>

    <!-- Scroll to Top Button -->
    <button class="scroll-top-btn" id="scrollTopBtn" aria-label="Scroll to top">&#8593;</button>

    <script>
        // Generate 12 Picsum placeholder images with varied dimensions for the masonry effect
        const imageSpecs = [
            { w: 600, h: 800 }, { w: 600, h: 600 }, { w: 600, h: 900 },
            { w: 600, h: 700 }, { w: 600, h: 1000 }, { w: 600, h: 650 },
            { w: 600, h: 850 }, { w: 600, h: 600 }, { w: 600, h: 750 },
            { w: 600, h: 950 }, { w: 600, h: 500 }, { w: 600, h: 800 }
        ];

        const grid = document.getElementById('gallery-grid');
        let imagesHTML = '';

        imageSpecs.forEach((spec, index) => {
            // Using the random seed ensures images stay consistent on refresh
            const imgSrc = `https://picsum.photos/seed/karina${index}/${spec.w}/${spec.h}`;
            imagesHTML += `
                <div class="masonry-item">
                    <img src="${imgSrc}" alt="Gallery Image ${index + 1}" data-index="${index}">
                </div>
            `;
        });

        grid.innerHTML = imagesHTML;

        // Lightbox Logic
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const galleryImages = document.querySelectorAll('.masonry-item img');
        let currentIndex = 0;

        function openLightbox(index) {
            currentIndex = index;
            updateLightboxImage();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function updateLightboxImage() {
            lightboxImg.classList.remove('loaded');
            
            // Allow slight delay to let CSS handle the fade out before changing src
            setTimeout(() => {
                lightboxImg.src = galleryImages[currentIndex].src;
                // Re-apply fade-in class once the new image is loaded
                lightboxImg.onload = () => lightboxImg.classList.add('loaded');
            }, 150);
        }

        function nextImage(e) {
            if(e) e.stopPropagation();
            currentIndex = (currentIndex + 1) % galleryImages.length;
            updateLightboxImage();
        }

        function prevImage(e) {
            if(e) e.stopPropagation();
            currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
            updateLightboxImage();
        }

        // Event Listeners
        galleryImages.forEach(img => {
            img.addEventListener('click', (e) => {
                openLightbox(parseInt(e.target.getAttribute('data-index')));
            });
        });

        document.getElementById('close-lightbox').addEventListener('click', closeLightbox);
        document.getElementById('next-btn').addEventListener('click', nextImage);
        document.getElementById('prev-btn').addEventListener('click', prevImage);

        // Close lightbox when clicking anywhere outside the image
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox || e.target.classList.contains('lightbox-img-wrapper')) {
                closeLightbox();
            }
        });

        // Keyboard accessibility
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        });

        // Scroll Reveal Animation
        document.addEventListener("DOMContentLoaded", () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.15 });
            document.querySelectorAll('.fade-in-section').forEach(section => observer.observe(section));

            // Scroll to Top Logic
            const scrollTopBtn = document.getElementById('scrollTopBtn');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 400) {
                    scrollTopBtn.classList.add('show');
                } else {
                    scrollTopBtn.classList.remove('show');
                }
            });
            scrollTopBtn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // Mobile Menu Logic
            const mobileMenu = document.getElementById('mobile-menu');
            const navMenu = document.getElementById('nav-menu');
            mobileMenu.addEventListener('click', () => {
                mobileMenu.classList.toggle('is-active');
                navMenu.classList.toggle('active');
                document.body.style.overflow = navMenu.classList.contains('active') ? 'hidden' : '';
            });
        });
    </script>
</body>
</html>
