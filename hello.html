<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            /* Clean, modern blue background */
            background-color: #007BFF; 
            /* White text */
            color: #FFFFFF; 
            /* Clean sans-serif font */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            
            /* CSS Flexbox to perfectly center the content */
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Take up the full viewport height */
            height: 100vh; 
            /* Remove default browser margins */
            margin: 0; 
        }

        h1 {
            font-size: 4rem;
            font-weight: 600;
            /* Slight letter spacing for a polished look */
            letter-spacing: 1.5px; 
            /* Optional subtle shadow to make the white text pop */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <h1>It Works!</h1>
</body>
</html>
