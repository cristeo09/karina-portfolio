<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Karina</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000000'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-size='60' fill='%23FFFFFF' font-family='serif'>K</text></svg>">
    
    <!-- Google Fonts: Viaoda Libre, Pinyon Script, DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400&family=Pinyon+Script&family=Viaoda+Libre&display=swap" rel="stylesheet">

    <style>
        /* CSS Reset & Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'DM Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 2rem;
            z-index: 10;
        }

        nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 3rem;
        }

        nav a {
            color: #FFFFFF;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: opacity 0.3s ease;
        }

        nav a:hover {
            opacity: 0.6;
        }

        /* Mobile Menu Toggle */
        .menu-toggle {
            display: none;
            cursor: pointer;
            position: absolute;
            top: 2rem;
            right: 2rem;
            z-index: 100;
        }

        .menu-toggle .bar {
            display: block;
            width: 25px;
            height: 2px;
            margin: 5px auto;
            transition: all 0.3s ease-in-out;
            background-color: #FFFFFF;
        }

        /* Contact Section Container */
        .contact-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 150px 2rem 5rem 2rem;
            width: 100%;
        }

        /* Form Styles */
        .contact-form {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 3rem; /* Generous spacing */
            margin-top: 2rem;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            color: #FFFFFF;
            padding: 0.5rem 0;
            font-family: 'DM Sans', sans-serif;
            font-size: 1.1rem;
            font-weight: 300;
            resize: none;
            border-radius: 0;
            transition: border-bottom-color 0.3s ease;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            outline: none;
            border-bottom-color: #FFFFFF; /* Brighter bottom border on focus */
        }

        .contact-form input::placeholder,
        .contact-form textarea::placeholder {
            color: rgba(255, 255, 255, 0.3); /* Low opacity white placeholder */
        }

        .contact-form textarea {
            height: 120px;
        }

        /* Submit Button */
        .submit-btn {
            background-color: #FFFFFF;
            color: #000000;
            border: 1px solid #FFFFFF;
            font-family: 'DM Sans', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 1rem 2rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            align-self: center;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background-color: #000000;
            color: #FFFFFF;
        }

        /* Success Message */
        .success-message {
            display: none;
            text-align: center;
            font-family: 'Viaoda Libre', serif;
            font-size: 2rem;
            letter-spacing: 2px;
            padding: 4rem 0;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Social Links */
        .social-links {
            margin-top: 5rem;
            text-align: center;
        }

        .social-links a {
            color: #FFFFFF;
            transition: opacity 0.3s ease;
            display: inline-block;
        }

        .social-links a:hover {
            opacity: 0.6;
        }

        .social-links svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-up-load {
            animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            will-change: opacity, transform;
        }

        .fade-in-section {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s cubic-bezier(0.2, 0.8, 0.2, 1), transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: opacity, transform;
        }

        .fade-in-section.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

    /* Scroll to Top Button */
    .scroll-top-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 45px;
        height: 45px;
        background-color: #FFFFFF;
        color: #000000;
        border: none;
        border-radius: 50%;
        font-size: 1.2rem;
        cursor: pointer;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transform: translateY(20px);
        transition: all 0.3s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .scroll-top-btn.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    .scroll-top-btn:hover {
        background-color: #e6e6e6;
        transform: translateY(-3px);
    }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            nav ul {
                position: fixed;
                top: 0;
                left: 100%;
                width: 100%;
                height: 100vh;
                background-color: #000000;
                flex-direction: column;
                align-items: center;
                transition: left 0.4s ease;
                z-index: 99;
                margin: 0;
                padding: 0;
            }
            nav ul.active {
                left: 0;
            }
            nav ul li {
                margin: 1.5rem 0;
            }
            nav ul a {
                font-size: 1.5rem;
            }
            .menu-toggle {
                display: block;
            }
            .menu-toggle.is-active {
                position: fixed;
            }
            .menu-toggle.is-active .bar:nth-child(2) { opacity: 0; }
            .menu-toggle.is-active .bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
            .menu-toggle.is-active .bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

            .contact-form { gap: 2rem; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="menu-toggle" id="mobile-menu" aria-label="Toggle menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
        <ul id="nav-menu">
            <li><a href="home.html">Home</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Contact Section -->
    <main class="contact-section fade-up-load">
        
        <!-- Contact Form -->
        <form class="contact-form" id="contact-form">
            <input type="text" id="name" name="name" placeholder="Name" required>
            <input type="email" id="email" name="email" placeholder="Email Address" required>
            <textarea id="message" name="message" placeholder="Message" required></textarea>
            <button type="submit" class="submit-btn">Send Inquiry</button>
        </form>

        <!-- Success Message (Hidden by default) -->
        <div class="success-message" id="success-message">
            Thank you. I'll be in touch soon.
        </div>

        <!-- Instagram Icon Link -->
        <div class="social-links">
            <a href="#" aria-label="Instagram">
                <!-- Inline SVG for Instagram Icon -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
               </svg>
           </a>
       </div>
   </main>

    <!-- Scroll to Top Button -->
    <button class="scroll-top-btn" id="scrollTopBtn" aria-label="Scroll to top">&#8593;</button>

   <script>
       document.getElementById('contact-form').addEventListener('submit', function(e) {
           e.preventDefault(); // Prevent page reload
           
           // Hide the form
           this.style.display = 'none';
           
           // Show the success message
           document.getElementById('success-message').style.display = 'block';
       });

       // Scroll Reveal Animation
       document.addEventListener("DOMContentLoaded", () => {
           const observer = new IntersectionObserver((entries) => {
               entries.forEach(entry => {
                   if (entry.isIntersecting) {
                       entry.target.classList.add('is-visible');
                       observer.unobserve(entry.target);
                   }
               });
           }, { threshold: 0.15 });
           document.querySelectorAll('.fade-in-section').forEach(section => observer.observe(section));

            // Scroll to Top Logic
            const scrollTopBtn = document.getElementById('scrollTopBtn');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 400) {
                    scrollTopBtn.classList.add('show');
                } else {
                    scrollTopBtn.classList.remove('show');
                }
            });
            scrollTopBtn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // Mobile Menu Logic
            const mobileMenu = document.getElementById('mobile-menu');
            const navMenu = document.getElementById('nav-menu');
            mobileMenu.addEventListener('click', () => {
                mobileMenu.classList.toggle('is-active');
                navMenu.classList.toggle('active');
                document.body.style.overflow = navMenu.classList.contains('active') ? 'hidden' : '';
            });
       });
   </script>
</body>
</html>
